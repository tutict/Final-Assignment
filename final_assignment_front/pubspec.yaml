name: final_assignment_front
description: Final assignment traffic violation case management frontend
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  get: ^4.7.3

  # Network
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Local storage
  flutter_secure_storage: ^10.3.0
  shared_preferences: ^2.3.2

  # JWT
  jwt_decoder: ^2.0.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  logger: ^2.4.0
  logging: ^1.3.0

  # JSON serialization
  json_annotation: ^4.9.0

  # UI and visualization
  qr_flutter: ^4.1.0
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  path_provider: ^2.1.5
  flutter_floating: ^2.0.1
  eva_icons_flutter: ^3.1.0
  local_captcha: ^1.0.5
  card_swiper: ^3.0.1
  flutter_svg: ^2.2.2
  percent_indicator: ^4.2.5
  flutter_login: ^7.0.0
  fl_chart: ^1.2.0
  flutter_cache_manager: ^3.4.1
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/raster/
    - assets/images/vector/
    - assets/images/ic_logo.jpg
