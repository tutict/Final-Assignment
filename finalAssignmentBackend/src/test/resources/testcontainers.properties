# Disable Ryuk to avoid pulling testcontainers/ryuk in restricted networks.
testcontainers.reuse.enable=true
ryuk.disabled=true
testcontainers.ryuk.disabled=true

# If a Docker mirror is required, configure it in Docker Desktop or CI before tests.
docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy
docker.host=npipe:////./pipe/dockerDesktopLinuxEngine
docker.tls.verify=false
