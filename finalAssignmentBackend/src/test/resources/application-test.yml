spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${TEST_DB_URL:jdbc:tc:mysql:8.0:///testdb}
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    password: ${DB_PASSWORD:test_password}
  kafka:
    bootstrap-servers: ${TEST_KAFKA_SERVERS:localhost:9092}
  data:
    redis:
      host: localhost
      port: 6379

ai:
  provider:
    primary: mock
  chat:
    streaming:
      enabled: true

jwt:
  secret: ${JWT_SECRET:test-secret-key-for-integration-tests-minimum-32-chars}
  access-token-expiration: 3600
  refresh-token-expiration: 86400

backend:
  url: ${BACKEND_URL:http://localhost}

logging:
  level:
    com.tutict.finalassignmentbackend: DEBUG
    org.springframework.security: DEBUG
