spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3306/traffic_test?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    driver-class-name: ${TEST_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${TEST_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:root}}}
    password: ${TEST_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:root}}}
  kafka:
    bootstrap-servers: ${TEST_KAFKA_SERVERS:localhost:9092}
    listener:
      auto-startup: false
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false
    elasticsearch:
      repositories:
        enabled: false
  ai:
    ollama:
      chat:
        enabled: false
      embedding:
        enabled: false

ai:
  provider:
    primary: mock
  chat:
    streaming:
      enabled: true
  ollama:
    chat:
      enabled: false
    embedding:
      enabled: false

rag:
  embedding:
    enabled: false

jwt:
  secret: ${JWT_SECRET:test-secret-key-for-integration-tests-minimum-32-chars}
  access-token-expiration: 3600
  refresh-token-expiration: 86400

backend:
  url: ${BACKEND_URL:http://localhost}

logging:
  level:
    com.tutict.finalassignmentbackend: DEBUG
    org.springframework.security: DEBUG
