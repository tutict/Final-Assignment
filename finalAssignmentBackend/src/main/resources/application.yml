ai:
  chat:
    streaming:
      enabled: false
    stream:
      keepalive: PT15S
  provider:
    primary: mock
    fallback: noop
    timeout: PT60S
    streaming-timeout: PT180S
    retry-attempts: 1
    circuit-breaker-failure-threshold: 3
    health-cache-ttl: PT30S
  ollama:
    enabled: true
    base-url: http://localhost:11434
    chat-model: qwen3:8b
  openai-compatible:
    enabled: false
    base-url: ""
    api-key: ""
    chat-model: ""

rag:
  enabled: false
  chunk:
    size: 500
    overlap: 100
  indexing:
    enabled: false
    batch-size: 200
  embedding:
    enabled: false
  index:
    name: rag_chunk_v1
    alias: rag_chunk_current
  retrieval:
    enabled: false
    top-k: 10
    vector-weight: 0.6
    bm25-weight: 0.4
    min-score: 0.2
