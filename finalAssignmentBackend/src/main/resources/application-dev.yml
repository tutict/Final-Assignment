spring:
  datasource:
    password: dev_password_local
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
  ai:
    ollama:
      init:
        pull-model-strategy: never

backend:
  url: http://localhost:8080
  port: 8080

app:
  dev-services:
    redpanda:
      enabled: false
  docker:
    startup-script:
      enabled: true
    images:
      elasticsearch: ${ELASTICSEARCH_IMAGE:docker.elastic.co/elasticsearch/elasticsearch:9.4.1}
  ollama:
    startup-script:
      enabled: true
  elasticsearch:
    fallback:
      enabled: true
    startup-sync:
      enabled: false
  security:
    token-blacklist:
      fail-open: true

management:
  health:
    elasticsearch:
      enabled: false
